{% extends 'base.html' %}

{% block title %}Eliminar Producto | EcoTienda Admin{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">

        <div class="w-16 h-16 mx-auto rounded-full bg-rose-100 flex items-center justify-center mb-5">
            <i class="fa-solid fa-trash text-rose-500 text-2xl"></i>
        </div>

        <h1 class="text-2xl font-extrabold text-gray-900 mb-2">¿Eliminar producto?</h1>
        <p class="text-gray-500 text-sm mb-1">Esta acción es permanente y no se puede deshacer.</p>
        <p class="font-semibold text-gray-800 mt-4 mb-6 text-lg">
            "{{ product.name }}"
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-3">
            <a href="{% url 'store:admin_product_list' %}"
               class="flex-1 inline-flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Cancelar
            </a>
            <form method="POST" class="flex-1">
                {% csrf_token %}
                <button type="submit"
                        class="w-full inline-flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold text-white bg-rose-500 hover:bg-rose-600 hover:-translate-y-0.5 transition-all shadow">
                    <i class="fa-solid fa-trash"></i> Sí, eliminar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
