{# Sub-template DRY: renderiza label, widget y errores de cualquier campo de formulario. #}
{# Uso: include 'store/_form_field.html' with field=form.nombre_campo #}
<div>
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
        {{ field.label }}{% if field.field.required %}<span class="text-rose-400 ml-0.5">*</span>{% endif %}
    </label>
    {{ field }}
    {% for error in field.errors %}
    <p class="mt-1 text-xs text-orange-500">
        <i class="fa-solid fa-triangle-exclamation mr-1"></i>{{ error }}
    </p>
    {% endfor %}
</div>
